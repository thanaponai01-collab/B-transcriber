# Engine choices — determined by eval harness bootstrapping
# Engine A: Thai specialist (Thonburian Whisper lineage)
# Engine B: multilingual generalist (Whisper large-v3) — the code-switch slot.
#           Real second hypothesis ⇒ cross-engine agreement is a live confidence
#           signal. It's off (passthrough) because every candidate tried so far
#           has been rejected:
#
#           funasr (SenseVoiceSmall) — RETRACTED, not just rejected. Its own
#           model card documents exactly five supported languages (zh/en/yue/
#           ja/ko) — Thai isn't one. With language="auto" it misdetects Thai
#           speech as Cantonese and decodes Chinese-script garbage throughout
#           (confirmed 2026-07-16 by inspecting raw output: an explicit <|yue|>
#           tag and CJK Unified Ideograph codepoints, not Thai script). The
#           2026-07-15/16 "WER_latin regressed / BER improved" numbers earlier
#           recorded here were measuring that garbage, not a real accuracy
#           tradeoff — DO NOT cite them as evidence about decorrelated engines
#           in general. See engines/funasr.py's docstring and TODO_LEDGER.md.
#           Not re-testable without a different underlying model.
#
#           typhoon_rt (2026-07-16) — TRIED and rejected on genuine accuracy
#           grounds: CER_thai regressed 0.1601 vs 0.1451 baseline, WER_latin
#           regressed 1.1290 vs 1.0452, BER only marginally better (0.8537 vs
#           0.8592). (Its first run crashed on CUDNN_STATUS_SUBLIBRARY_VERSION_
#           MISMATCH — a real, separate bug in faster_whisper.py's PATH
#           mutation leaking into any same-process NeMo engine, since fixed;
#           see TODO_LEDGER.) Don't re-try without new evidence.
#
#           whisper_multi (Whisper large-v3) — genuinely Thai-capable (~100
#           languages incl. Thai), architecturally the right decorrelated
#           candidate — but REJECTED on this probe too: CER_thai regressed
#           0.2323 vs 0.1451 (~60% relative), WER_latin regressed 1.0903 vs
#           1.0452, BER unchanged (0.8616 vs 0.8592). Root cause (diagnosed,
#           not a mystery): on every real A/B disagreement instrumented (11/11
#           on a sample clip), BOTH the LLM reconciler and _script_fallback
#           picked Engine A — the LLM shows a suspicious 100% positional bias
#           under the current (stale, pre-phrase-cue) prompt, and
#           _script_fallback degrades to pure same-script routing because
#           whisper_multi correctly reports confidence=None (never faked) so
#           its confidence-tiebreak never fires. Engine B's only route into
#           the output is un-reconciled solo tokens, which dilute rather than
#           correct. See TODO_LEDGER for the full diagnosis and next steps
#           (prompt fix, position-randomization test, fallback tiebreak).
#           NOT evidence the architecture can't work — evidence the current
#           prompt/model/fallback combination doesn't yet make it work.
#
#           Next untried candidate: a Qwen3-ASR adapter (see
#           IMPLEMENT_IMPROVEMENTS.md Phase 2).
engine_a: faster_whisper
engine_b: passthrough
engine_batch_size: 4   # chunks per forward pass when an engine supports batched inference;
                        # auto-halves on CUDA OOM (variable-length VAD chunks get padded to
                        # the longest one in a batch, so peak VRAM varies even at fixed batch_size)

# Per-engine construction overrides (2.3), keyed by registry name. run.py forwards
# the matching block as kwargs to the engine constructor — an engine/model/compute
# swap is a YAML edit only. Engines that don't accept a key (passthrough/mock) get
# device only. To swap to Typhoon Turbo CT2 or int8_float16, edit here — no code.
engines:
  faster_whisper:
    # model_id: models/whisper-th-medium-ct2   # tried models/typhoon-whisper-turbo-ct2
    # (2026-07 gold-set eval): CER_thai 0.1336 vs 0.1069 for th-medium — turbo lost, reverted.
    compute_type: float16                        # int8_float16 frees 8GB headroom for larger batch_size
    beam_size: 5
    cue_gap_ms: 700
    cue_max_ms: 4000
    cue_target_chars: 42   # cue closes once it holds this many chars (subtitle-line
                           # sizing, same family as cue_gap_ms/cue_max_ms — see
                           # _group_words_into_cues; STYLE_GUIDE line-break policy)
    bias_prompt_budget: 200
    batch_size: 8                                # BatchedInferencePipeline parallel batch (3.1);
                                                 # auto-halves on CUDA OOM. Raise with int8_float16 headroom.
    # This engine is whole-file (prefers_whole_file=True), so ingest.py's VAD never
    # touches this audio — these mirror the top-level ingest.vad_threshold /
    # vad_min_silence_ms values and feed the engine's own VAD pass (run in
    # _transcribe_batched via _vad_speech_spans) instead of faster-whisper's
    # defaults (threshold=0.5, min_silence_duration_ms=2000), which were clipping
    # soft trailing speech and Thai sentence-final particles (ครับ/ค่ะ). Speech runs
    # longer than ~25s with no pause near that boundary (faster-whisper's own
    # aggressive-split point) are chopped into overlapping windows and stitched
    # instead of cut arbitrarily mid-utterance — see _LONG_SPAN_SAFE_S.
    vad_threshold: 0.35
    vad_min_silence_ms: 500

# Ingestion
denoise: true
vad_threshold: 0.35        # Thai sentence-final particles (ครับ/ค่ะ) get cut at 0.5
vad_min_speech_ms: 250
vad_min_silence_ms: 500    # wider silence window keeps soft particles intact
chunk_overlap_ms: 750       # GAP-4: adjacent VAD chunks overlap this much so stitch.py
                            # dedupes seam words (only used when a chunk engine is active)
conform_vfr: false          # GAP-2: transcode a CFR proxy for VFR sources before frame export

# Hallucination filtering (GAP-3): drop tokens that sit mostly inside VAD silence
drop_tokens_over_silence: true
silence_overlap: 0.8        # fraction of a token's span inside silence to drop it

# Evaluation
boundary_tol_ms: 300   # switch-point match tolerance (see eval/README.md)

# Normalization — explicit policy, see STYLE_GUIDE.md. Applied identically to
# hypotheses and to the gold set during eval.
normalization:
  thai_digits: true        # map Thai numerals ๐-๙ → Arabic 0-9
  mai_yamok_attach: true   # canonicalize 'word ๆ' / 'wordๆๆ' → 'wordๆ' (no expansion —
                            # deliberate divergence from Na-Thalang/Typhoon, see STYLE_GUIDE.md §3)
  exception_lexicon:
    - COVID-19
    - iPhone
    - iPad
    - YouTube
    - LINE OA        # before LINE: longest-first protection needs the longer form listed too
    - LINE
    - TikTok
    - Facebook
    - Instagram
    - ChatGPT
    - GPT-4
    - AI
    - API
    # Thai e-commerce / daily-life brands that show up constantly in creator speech
    - Shopee
    - Lazada
    - Grab
    - Netflix
    - Google
    - Zoom
    - WiFi
    - Premiere Pro

# Eval regression gate: reject if a metric worsens by more than this fraction,
# OR by more than regression_abs_floor in absolute terms — whichever band is
# wider. The absolute floor keeps a near-zero baseline from tripping on any
# nonzero score (relative-only collapses to 0 when the baseline is 0).
regression_tolerance: 0.02
regression_abs_floor: 0.005

# Flywheel
flywheel:
  min_occurrences: 3       # corrections needed before a term enters the bias index
  stale_engine_weight: 0.2 # weight for corrections from engines no longer active
  bias_prompt_budget: 200  # GAP-5: max tokens packed into an engine's initial_prompt

# CutDeck rough-cut system (Part B) — config consumed by the cutdeck/ package.
# Present now so Phase 0 (timebase + VAD persistence) has a home; the deterministic
# rules pass turns on after the first eval baseline.
cut:
  min_silence_ms: 900       # VAD silence longer than this becomes a cut
  pad_pre_ms: 250           # kept pre-roll before speech (attack matters most)
  pad_post_ms: 120          # kept post-roll after speech
  min_clip_ms: 1200         # kept clips shorter than this merge into a neighbor
  fillers_enabled: false    # turn on after first eval baseline
  filler_lexicon: [เอ่อ, อ่า, อืม, เอิ่ม, um, uh]
  filler_lexicon_contextual: [แบบ, แบบว่า, ก็คือ, คือว่า, like, you know]
  retake_markers: [เดี๋ยวเอาใหม่, เอาใหม่นะ, ตัดตรงนี้, อันนี้ผิด, เมื่อกี้พูดผิด]
  llm_enabled: true
  keep_last_take: true
segment:
  gap_ms: 700               # token gap larger than this starts a new segment
  vad_silence_ms: 500       # VAD silence between tokens that forces a split

# Phase 3 — LLM reconciler tiebreak on A/B disagreements. Local-only: calls a
# model served by `ollama serve`, never an external API. Off by default —
# reconcile._pick() falls back to _script_fallback whenever llm_enabled is
# false, Ollama isn't running, or the model isn't pulled (any exception from
# llm_reconcile.make_llm_fn's callable is caught there). Requires
# `ollama pull <model>` once, and `ollama serve` running locally, before
# enabling.
#
# PROBED 2026-07-16 (Ollama running, qwen2.5:3b-instruct, engine_b=
# whisper_multi so real disagreements existed) in two rounds:
#   Round 1 (stale prompt, fixed ta=slot-0 mapping): LLM picked Engine A on
#   11/11 real disagreements — positional bias, not judgment.
#   Round 2 (llm_reconcile.py fixed: phrase-cue-aware prompt + per-call
#   position randomization, see its module docstring): the degenerate lock-in
#   is confirmed gone (7/11 A, 4/11 B on re-instrumentation) — but corpus
#   CER_thai got WORSE (0.3505 vs round 1's 0.2323 vs 0.1451 baseline). This
#   is the fix correctly exposing a model-quality problem, not a new bug:
#   qwen2.5:3b-instruct's judgment on real disagreements isn't good enough to
#   beat the (accidental, round-1) heuristic of always trusting the stronger
#   engine. The wiring/prompt/bias defects are fixed and should not be
#   revisited; what remains is whether a bigger local model (qwen2.5:7b-
#   instruct?) or a richer prompt (few-shot examples, surrounding context)
#   can do genuinely better than always-trust-Engine-A. See TODO_LEDGER.md.
reconciler:
  llm_enabled: false
  ollama:
    host: http://localhost:11434
    model: qwen2.5:3b-instruct
    timeout_s: 30   # first call after Ollama has unloaded the model can take >10s to reload
